<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password - NewsPulse</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#137fec",
        "background-light": "#f6f7f8",
        "background-dark": "#101922"
      },
      fontFamily: { "display": ["Work Sans"] },
      borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" }
    }
  }
};
</script>
</head>
<body class="bg-background-dark font-display text-slate-100 min-h-screen flex flex-col">
<header class="w-full dark:bg-background-dark border-b border-slate-200 dark:border-slate-800 bg-background-dark">
<div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
<div class="flex items-center gap-2">
<h2 class="text-slate-100 text-xl font-bold tracking-tight">NewsPulse</h2>
</div>
</div>
</header>

<main class="flex-grow flex items-center justify-center p-4">
<div class="w-full max-w-[480px]">
<div class="dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden border border-slate-100 dark:border-slate-800 p-8">
<div class="text-center mb-8">
<h1 class="text-2xl font-bold text-slate-100 mb-2">Forgot Password?</h1>
<p class="text-slate-400">
Enter your email and we’ll send you a link to reset your password.
</p>
</div>

<form id="forgotForm" class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-300" for="email">Email Address</label>
<input class="w-full pl-3 pr-4 py-3 rounded-lg border border-slate-700 bg-slate-800 text-slate-100 placeholder-slate-500 focus:ring-2 focus:ring-primary outline-none" id="email" name="email" placeholder="name@example.com" required type="email"/>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 px-4 rounded-lg shadow-md transition-all" type="submit">Send Reset Link</button>
</form>

<div class="mt-8 pt-6 border-t border-slate-800 text-center">
<a class="inline-flex items-center gap-2 text-primary hover:text-primary/80 font-medium transition-colors" href="loginPage.html">
<span class="material-symbols-outlined text-lg">arrow_back</span>Back to Sign In
</a>
</div>
</div>
</div>
</main>

<script>
document.getElementById("forgotForm").addEventListener("submit", function(e){
    e.preventDefault();
    let email = document.getElementById("email").value;

    let users = JSON.parse(localStorage.getItem("users") || "[]");
    let user = users.find(u => u.email === email);

    if(!user){
        alert("Email not found");
        return;
    }

    // Generate token
    let token = Math.random().toString(36).substring(2,12);
    let resetTokens = JSON.parse(localStorage.getItem("resetTokens") || "{}");
    resetTokens[token] = email;
    localStorage.setItem("resetTokens", JSON.stringify(resetTokens));

    // Redirect
    window.location.href = `ResetPassword.html?token=${token}`;
});
</script>
</body>
</html>
