<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Work Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Work Sans", sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen font-display">
<div class="relative flex flex-col min-h-screen w-full overflow-x-hidden">
<!-- Simplified Header -->
 <div id="headerContainer"></div>
<!-- Main Content Section -->
<main class="flex-1 flex flex-col items-center justify-center px-4 py-12">
<div class="w-full max-w-[440px] flex flex-col gap-8">
<!-- Title and Description -->
<div class="flex flex-col gap-3 text-center">
<div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-primary/10 text-primary mb-2">
<span class="material-symbols-outlined text-3xl">
                            lock_reset
                        </span>
</div>
<h1 class="text-slate-900 dark:text-white text-3xl font-black leading-tight tracking-tight">Set New Password</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal">Your new password must be different from previously used passwords.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-200 text-sm font-semibold ml-1">New Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">
                                lock
                            </span>
<input class="w-full pl-12 pr-4 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Min. 8 characters" type="password"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-900 dark:text-slate-200 text-sm font-semibold ml-1">Confirm New Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-4 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Repeat new password" type="password"/>
</div>
</div>
<div class="pt-2">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
<span>Reset Password</span>
<span class="material-symbols-outlined text-lg">
                                arrow_forward
                            </span>
</button>
</div>
</form>
<!-- Back to Sign In -->
<div class="text-center">
<a class="inline-flex items-center gap-2 text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors font-medium" href="loginPage.html">
<span class="material-symbols-outlined text-lg">
                            arrow_back
                        </span>
<span>Back to Sign In</span>
</a>
</div>
</div>
</main>
<!-- Footer Decor -->
<footer class="p-8 text-center">
<p class="text-slate-500 dark:text-slate-600 text-sm">
                © 2024 NewsPulse Media Group. All rights reserved.
            </p>
</footer>
</div>
</body></html>
<script src="../Components/Header/Header.js"></script>
