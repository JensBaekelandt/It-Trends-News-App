<body class="bg-background-dark font-display text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="w-full dark:bg-background-dark border-b border-slate-200 dark:border-slate-800 bg-background-dark">
<div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="text-primary">
<svg class="size-8" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-slate-100 text-xl font-bold leading-tight tracking-tight">NewsPulse</h2>
</div>
<div class="flex items-center gap-4">
<a class="text-sm font-medium text-slate-400 hover:text-primary" href="#">Help Center</a>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center p-4">
<div class="w-full max-w-[480px]">
<!-- Reset Password Card -->
<div class="dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden border border-slate-100 dark:border-slate-800 bg-slate-900">
<!-- Illustration/Icon Header -->
<div class="w-full h-48 bg-primary/10 flex items-center justify-center bg-cover bg-center" data-alt="Abstract blue gradient with soft patterns" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDG6dturp_KhNMYeNDGI9QhW1J7C970JuvMAVZKms5maC-mo0NwKlBXXHPF5nYus0eeewzfnbOYjo_37jAvg-UEZnszYgDbQyWZvYOH7Q8SUI16vvD_xQ0opGCTADd88pVnUbl9XRkCQsAxSzEMmsxEpS2HVD7K4FfTjIDQK6JsQI1Kf8EvavkPQ_BLoelVE9AgxwyQT3TRTxYo8sUQzBiKcwscoL6wpMq7eki-W5WdFl9Krc199HcPfb2OzNQGz04Mh7M9PZPddWI');"><div class="bg-slate-900/90 p-6 rounded-full shadow-lg">
<span class="material-symbols-outlined text-primary text-5xl">lock_reset</span>
</div></div>
<div class="p-8">
<div class="text-center mb-8">
<h1 class="text-2xl font-bold text-slate-100 mb-2">Forgot Password?</h1>
<p class="text-slate-400">
                            Enter your email address and we'll send you a link to reset your password and get you back into your account.
                        </p>
</div>
<form class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-300" for="email">
                                Email Address
                            </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">
                                    mail
                                </span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-700 bg-slate-800 text-slate-100 placeholder-slate-500 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 px-4 rounded-lg shadow-md shadow-primary/20 transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">
                                arrow_forward
                            </span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-slate-800 text-center">
<a class="inline-flex items-center gap-2 text-primary hover:text-primary/80 font-medium transition-colors" href="loginPage.html">
<span class="material-symbols-outlined text-lg">arrow_back</span>
                            Back to Sign In
                        </a>
</div>
</div>
</div>
<!-- Footer Links -->
<div class="mt-8 flex justify-center gap-6 text-sm text-slate-500 font-medium">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Contact Support</a>
</div>
</div>
</main>

        © 2024 NewsPulse Media Inc. All rights reserved.
    </footer>
