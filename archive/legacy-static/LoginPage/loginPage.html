<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In - NewsRoom</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode:"class",
  theme:{ extend:{ colors:{primary:"#137fec","background-light":"#f6f7f8","background-dark":"#101922"}, fontFamily:{display:["Work Sans","sans-serif"]}, borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px"} } }
};
</script>
<style>.material-symbols-outlined{font-variation-settings:'FILL'0,'wght'400,'GRAD'0,'opsz'24;}</style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col">

<header class="flex items-center justify-between border-b border-gray-200 dark:border-[#283039] px-10 py-3 bg-white dark:bg-background-dark">
  <div class="flex items-center gap-2 text-primary dark:text-white">
    <div class="size-8">
      <svg fill="none" viewBox="0 0 48 48">
        <path d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z" fill="currentColor"/>
      </svg>
    </div>
    <h2 class="text-xl font-bold tracking-[-0.015em] text-slate-900 dark:text-white">NewsRoom</h2>
  </div>
</header>

<main class="flex-grow flex items-center justify-center p-6">
  <div class="w-full max-w-[440px] bg-white dark:bg-[#1c2127] rounded-xl shadow-xl border border-gray-100 dark:border-[#283039] p-8">
    <div class="text-center mb-8">
      <h1 class="text-slate-900 dark:text-white text-[32px] font-bold">Welcome Back</h1>
      <p class="text-slate-500 dark:text-[#9dabb9] text-sm mt-2">Sign in to your personalized news feed</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div class="flex flex-col gap-2">
        <label class="text-slate-700 dark:text-white text-base font-medium">Email Address</label>
        <input id="loginEmail" type="email" required placeholder="Enter your email" 
          class="form-input w-full rounded-lg text-slate-900 dark:text-white border border-gray-300 dark:border-[#3b4754] bg-white dark:bg-[#1c2127] h-14 p-[15px]"/>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-slate-700 dark:text-white text-base font-medium">Password</label>
        <input id="loginPassword" type="password" required placeholder="Enter your password" 
          class="form-input w-full rounded-lg text-slate-900 dark:text-white border border-gray-300 dark:border-[#3b4754] bg-white dark:bg-[#1c2127] h-14 p-[15px]"/>
      </div>
        <div class="flex justify-end">
            <a class="text-primary text-sm font-medium leading-normal hover:underline" href="ForgotPassword.html">Forgot Password?</a>
        </div>
      <button type="submit" class="w-full flex items-center justify-center rounded-lg h-14 px-6 bg-primary text-white text-base font-bold hover:bg-blue-600">
        Sign In
      </button>
    </form>

    <p class="text-center mt-8 text-slate-500 dark:text-[#9dabb9] text-sm">
      Don't have an account? 
      <a class="text-primary font-bold hover:underline ml-1" href="creatLogin.html">Sign Up</a>
    </p>
  </div>
</main>

<script src="auth.js"></script>
<script>
redirectIfLoggedIn();

document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();
  let email = document.getElementById("loginEmail").value;
  let password = document.getElementById("loginPassword").value;
  login(email, password);
});
</script>

</body>
</html>
