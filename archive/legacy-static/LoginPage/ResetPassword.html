<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password - NewsPulse</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode:"class",
  theme:{
    extend:{
      colors:{primary:"#137fec","background-light":"#f6f7f8","background-dark":"#101922"},
      fontFamily:{display:["Work Sans"]},
      borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px"}
    }
  }
};
</script>
</head>
<body class="bg-background-dark font-display text-slate-100 min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center p-6">
<div class="w-full max-w-[440px] bg-slate-900 rounded-xl shadow-xl p-8">
<div class="text-center mb-8">
<h1 class="text-3xl font-bold text-slate-100">Set New Password</h1>
<p class="text-slate-400 text-base mt-2">Your new password must be different from previously used passwords.</p>
</div>

<form id="resetForm" class="flex flex-col gap-5">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-300">New Password</label>
<input id="newPassword" type="password" placeholder="Min. 8 characters" class="w-full px-4 py-3 rounded-lg border border-slate-700 bg-slate-800 text-slate-100 focus:ring-2 focus:ring-primary outline-none"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-300">Confirm New Password</label>
<input id="confirmNewPassword" type="password" placeholder="Repeat new password" class="w-full px-4 py-3 rounded-lg border border-slate-700 bg-slate-800 text-slate-100 focus:ring-2 focus:ring-primary outline-none"/>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg" type="submit">Reset Password</button>
</form>

<div class="mt-6 text-center">
<a class="text-primary hover:text-primary/80 font-medium" href="loginPage.html">Back to Sign In</a>
</div>
</div>
</main>

<script>
function getTokenFromURL(){
    let params = new URLSearchParams(window.location.search);
    return params.get("token");
}

document.getElementById("resetForm").addEventListener("submit", function(e){
    e.preventDefault();

    let newPass = document.getElementById("newPassword").value;
    let confirmPass = document.getElementById("confirmNewPassword").value;

    if(newPass !== confirmPass){
        alert("Passwords do not match");
        return;
    }
    if(newPass.length < 8){
        alert("Password must be at least 8 characters");
        return;
    }

    let token = getTokenFromURL();
    let resetTokens = JSON.parse(localStorage.getItem("resetTokens") || "{}");
    let email = resetTokens[token];

    if(!email){
        alert("Invalid or expired reset link");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users") || "[]");
    let user = users.find(u => u.email === email);
    if(user){
        user.password = newPass;
        localStorage.setItem("users", JSON.stringify(users));
    }

    delete resetTokens[token];
    localStorage.setItem("resetTokens", JSON.stringify(resetTokens));

    alert("Password reset successfully!");
    window.location.href = "loginPage.html";
});
</script>
</body>
</html>
